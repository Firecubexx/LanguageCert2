<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Original exam-style practice for the LanguageCert General SELT (A2-C1) UKVI test.">
  <title>SELT Mastery | General SELT UKVI Practice</title>
  <style>
    :root {
      --navy: #101c36;
      --navy-2: #172746;
      --blue: #246bfd;
      --blue-soft: #eaf1ff;
      --cyan: #18a6b8;
      --green: #11875d;
      --green-soft: #e7f7f0;
      --amber: #e99a16;
      --amber-soft: #fff5df;
      --red: #d74747;
      --red-soft: #fff0f0;
      --ink: #172033;
      --muted: #68758c;
      --line: #dce3ee;
      --surface: #ffffff;
      --page: #f4f7fb;
      --shadow: 0 12px 30px rgba(16, 28, 54, .08);
      --radius: 16px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--page);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    a { color: inherit; }
    .hidden { display: none !important; }

    .app-shell { min-height: 100vh; display: grid; grid-template-rows: 72px 1fr; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 0 28px;
      color: #fff;
      background: linear-gradient(135deg, var(--navy), #142c55);
      box-shadow: 0 3px 18px rgba(8, 17, 35, .22);
    }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 220px; }
    .brand-mark {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 11px;
      background: linear-gradient(135deg, #3a7cff, #1fc3c8);
      font-weight: 900;
      letter-spacing: -.04em;
    }
    .brand-copy strong { display: block; font-size: 17px; letter-spacing: -.02em; }
    .brand-copy span { display: block; margin-top: 2px; color: #afbed7; font-size: 11px; }
    .top-actions { display: flex; align-items: center; gap: 10px; }
    .level-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 10px;
      color: #d9e3f4;
      font-size: 13px;
    }
    .level-chip select {
      color: #fff;
      border: 0;
      outline: 0;
      background: transparent;
      font-weight: 800;
    }
    .level-chip option { color: var(--ink); }
    .icon-btn {
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 10px;
      color: white;
      background: rgba(255,255,255,.06);
    }

    .body-grid { display: grid; grid-template-columns: 250px minmax(0, 1fr); }
    .sidebar {
      position: sticky;
      top: 72px;
      height: calc(100vh - 72px);
      padding: 22px 16px;
      overflow-y: auto;
      color: #d7e0ef;
      background: var(--navy);
    }
    .nav-label {
      padding: 0 12px;
      margin: 12px 0 8px;
      color: #7184a4;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
    }
    .nav-item {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 5px;
      padding: 11px 12px;
      color: #c0cde0;
      border: 0;
      border-radius: 10px;
      background: transparent;
      text-align: left;
      transition: .15s ease;
    }
    .nav-item:hover { color: #fff; background: rgba(255,255,255,.07); }
    .nav-item.active {
      color: #fff;
      background: linear-gradient(90deg, rgba(36,107,253,.35), rgba(36,107,253,.08));
      box-shadow: inset 3px 0 0 #65a0ff;
    }
    .nav-icon {
      width: 28px;
      height: 28px;
      display: grid;
      flex: 0 0 auto;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      background: rgba(255,255,255,.08);
      font-size: 12px;
      font-weight: 900;
    }
    .nav-item.active .nav-icon { background: var(--blue); }
    .side-note {
      margin: 24px 8px 0;
      padding: 14px;
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 12px;
      background: rgba(255,255,255,.04);
      color: #96a8c3;
      font-size: 11px;
      line-height: 1.55;
    }

    .main-wrap { min-width: 0; display: flex; flex-direction: column; }
    main { width: 100%; max-width: 1280px; margin: 0 auto; padding: 30px 34px 60px; flex: 1; }
    .site-footer {
      padding: 18px 28px;
      color: #7b8799;
      border-top: 1px solid var(--line);
      background: #fff;
      text-align: center;
      font-size: 12px;
    }
    .site-footer strong { color: var(--navy); }

    .page-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 24px;
    }
    .eyebrow {
      margin-bottom: 7px;
      color: var(--blue);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    h1, h2, h3, p { margin-top: 0; }
    h1 { margin-bottom: 8px; color: var(--navy); font-size: clamp(28px, 4vw, 42px); letter-spacing: -.04em; }
    h2 { margin-bottom: 8px; color: var(--navy); letter-spacing: -.025em; }
    h3 { color: var(--navy); letter-spacing: -.015em; }
    .lead { max-width: 780px; margin-bottom: 0; color: var(--muted); line-height: 1.65; }

    .hero {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1.4fr .8fr;
      gap: 24px;
      min-height: 270px;
      margin-bottom: 24px;
      padding: 36px;
      border-radius: 22px;
      color: white;
      background:
        radial-gradient(circle at 80% 20%, rgba(72,160,255,.38), transparent 26%),
        radial-gradient(circle at 95% 88%, rgba(30,213,194,.25), transparent 28%),
        linear-gradient(130deg, #101c36, #183a70);
      box-shadow: var(--shadow);
    }
    .hero::after {
      content: "";
      position: absolute;
      right: -45px;
      top: -70px;
      width: 240px;
      height: 240px;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 50%;
      box-shadow: 0 0 0 38px rgba(255,255,255,.025), 0 0 0 76px rgba(255,255,255,.02);
    }
    .hero-content { position: relative; z-index: 2; align-self: center; }
    .hero .eyebrow { color: #74d8e3; }
    .hero h1 { max-width: 700px; color: #fff; }
    .hero p { max-width: 660px; color: #c4d1e5; line-height: 1.7; }
    .hero-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 22px; }
    .hero-stats {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-self: center;
    }
    .hero-stat {
      padding: 18px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 15px;
      background: rgba(255,255,255,.075);
      backdrop-filter: blur(8px);
    }
    .hero-stat strong { display: block; font-size: 24px; }
    .hero-stat span { color: #adbed7; font-size: 11px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      padding: 10px 17px;
      border: 1px solid transparent;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 800;
      transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { color: #fff; background: var(--blue); box-shadow: 0 8px 18px rgba(36,107,253,.22); }
    .btn-primary:hover { background: #155be8; }
    .btn-light { color: var(--navy); background: #fff; }
    .btn-outline { color: var(--navy); border-color: var(--line); background: #fff; }
    .btn-ghost { color: #dce7f7; border-color: rgba(255,255,255,.2); background: rgba(255,255,255,.06); }
    .btn-danger { color: var(--red); border-color: #f2caca; background: #fff; }
    .btn:disabled { opacity: .48; cursor: not-allowed; transform: none; }

    .section-title-row { display: flex; align-items: center; justify-content: space-between; gap: 18px; margin: 28px 0 14px; }
    .section-title-row h2 { margin: 0; font-size: 20px; }
    .text-btn { padding: 0; border: 0; color: var(--blue); background: transparent; font-size: 12px; font-weight: 800; }

    .skill-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .skill-card, .panel, .task-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: 0 5px 16px rgba(16,28,54,.035);
    }
    .skill-card {
      position: relative;
      overflow: hidden;
      padding: 20px;
      transition: .16s ease;
    }
    .skill-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
    .skill-card::before { content: ""; position: absolute; inset: 0 0 auto; height: 4px; background: var(--skill); }
    .skill-icon {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      margin-bottom: 16px;
      border-radius: 12px;
      color: var(--skill);
      background: color-mix(in srgb, var(--skill) 12%, white);
      font-weight: 900;
    }
    .skill-card h3 { margin-bottom: 7px; }
    .skill-card p { min-height: 52px; color: var(--muted); font-size: 12px; line-height: 1.55; }
    .mini-progress { height: 6px; overflow: hidden; border-radius: 8px; background: #edf1f6; }
    .mini-progress span { display: block; height: 100%; border-radius: inherit; background: var(--skill); }
    .skill-meta { display: flex; justify-content: space-between; margin: 8px 0 15px; color: var(--muted); font-size: 10px; }
    .skill-links { display: flex; gap: 8px; }
    .skill-links .btn { flex: 1; min-height: 36px; padding: 7px; font-size: 11px; }

    .dashboard-grid { display: grid; grid-template-columns: 1.3fr .7fr; gap: 18px; }
    .panel { padding: 21px; }
    .panel-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
    .panel-head h3 { margin: 0; }
    .mock-banner {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: center;
      padding: 24px;
      color: #fff;
      border: 0;
      background: linear-gradient(130deg, #1f60d8, #314eaa);
    }
    .mock-banner h3 { color: #fff; }
    .mock-banner p { margin: 0; color: #cfddf7; font-size: 12px; line-height: 1.6; }
    .mock-specs { display: flex; gap: 14px; margin-top: 13px; color: #e6efff; font-size: 11px; font-weight: 700; }

    .exam-map { display: grid; gap: 9px; }
    .exam-row {
      display: grid;
      grid-template-columns: 42px minmax(0,1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 11px;
    }
    .exam-num { width: 35px; height: 35px; display: grid; place-items: center; border-radius: 9px; color: var(--blue); background: var(--blue-soft); font-size: 11px; font-weight: 900; }
    .exam-row strong { display: block; font-size: 12px; }
    .exam-row span { color: var(--muted); font-size: 10px; }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 8px;
      border-radius: 999px;
      color: #526178;
      background: #f0f3f7;
      font-size: 9px;
      font-weight: 900;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .tag.blue { color: var(--blue); background: var(--blue-soft); }
    .tag.green { color: var(--green); background: var(--green-soft); }
    .tag.amber { color: #a96800; background: var(--amber-soft); }

    .task-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 15px; }
    .task-card { padding: 20px; }
    .task-top { display: flex; justify-content: space-between; gap: 14px; }
    .task-number { color: var(--blue); font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: .1em; }
    .task-card h3 { margin: 8px 0 6px; font-size: 16px; }
    .task-card p { min-height: 42px; color: var(--muted); font-size: 12px; line-height: 1.55; }
    .task-card .btn { width: 100%; margin-top: 8px; }

    .exam-layout { display: grid; grid-template-columns: minmax(0,1fr) 280px; gap: 20px; align-items: start; }
    .exam-paper {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 17px;
      background: #fff;
      box-shadow: var(--shadow);
    }
    .exam-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 22px 24px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }
    .exam-header h2 { margin: 4px 0 5px; font-size: 21px; }
    .exam-header p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.55; }
    .timer {
      min-width: 102px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--navy);
      background: #fff;
      text-align: center;
      font-variant-numeric: tabular-nums;
      font-weight: 900;
    }
    .timer.warn { color: var(--red); border-color: #f0bcbc; background: var(--red-soft); }
    .exam-body { padding: 24px; }
    .instruction {
      margin-bottom: 20px;
      padding: 13px 15px;
      border-left: 4px solid var(--blue);
      border-radius: 8px;
      color: #43516a;
      background: var(--blue-soft);
      font-size: 12px;
      line-height: 1.6;
    }
    .source-box {
      margin-bottom: 20px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f9fafc;
      white-space: pre-line;
      line-height: 1.75;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 14px;
    }
    .audio-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
      padding: 14px;
      border: 1px solid #cee5e9;
      border-radius: 11px;
      background: #f0fbfc;
    }
    .audio-box strong { display: block; color: #126d79; font-size: 12px; }
    .audio-box span { color: #5f7d82; font-size: 10px; }
    .audio-btn { min-width: 112px; color: #fff; border: 0; border-radius: 9px; padding: 9px 12px; background: var(--cyan); font-size: 11px; font-weight: 900; }

    .question {
      padding: 19px 0;
      border-bottom: 1px solid #edf0f4;
    }
    .question:last-child { border-bottom: 0; }
    .q-label { margin-bottom: 7px; color: var(--blue); font-size: 10px; font-weight: 900; letter-spacing: .08em; text-transform: uppercase; }
    .q-text { margin-bottom: 12px; color: var(--navy); font-size: 14px; font-weight: 750; line-height: 1.55; }
    .options { display: grid; gap: 8px; }
    .option {
      position: relative;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 9px;
      color: #36435a;
      background: #fff;
      font-size: 12px;
      line-height: 1.5;
      transition: .12s ease;
    }
    .option:hover { border-color: #9bb8ed; background: #f8faff; }
    .option.selected { border-color: var(--blue); background: var(--blue-soft); }
    .option.correct { border-color: #75c6a8; background: var(--green-soft); }
    .option.incorrect { border-color: #e9a4a4; background: var(--red-soft); }
    .option input { margin-top: 2px; accent-color: var(--blue); }
    .short-input {
      width: min(100%, 420px);
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 9px;
      outline: 0;
      color: var(--ink);
      background: #fff;
      font-size: 13px;
    }
    .short-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(36,107,253,.1); }
    .short-input.correct { border-color: #75c6a8; background: var(--green-soft); }
    .short-input.incorrect { border-color: #e9a4a4; background: var(--red-soft); }
    .feedback { margin-top: 8px; font-size: 11px; line-height: 1.5; }
    .feedback.good { color: var(--green); }
    .feedback.bad { color: var(--red); }
    .explanation { color: var(--muted); }
    .exam-actions {
      position: sticky;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 15px 24px;
      border-top: 1px solid var(--line);
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(8px);
    }
    .action-group { display: flex; gap: 9px; flex-wrap: wrap; }

    .exam-side { position: sticky; top: 92px; display: grid; gap: 14px; }
    .side-panel { padding: 17px; border: 1px solid var(--line); border-radius: 14px; background: #fff; box-shadow: 0 5px 16px rgba(16,28,54,.04); }
    .side-panel h3 { margin-bottom: 12px; font-size: 13px; }
    .progress-line { height: 7px; overflow: hidden; border-radius: 8px; background: #edf1f6; }
    .progress-line span { display: block; height: 100%; background: linear-gradient(90deg, var(--blue), var(--cyan)); }
    .side-meta { display: flex; justify-content: space-between; margin-top: 8px; color: var(--muted); font-size: 10px; }
    .number-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .number-dot {
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--muted);
      background: #fff;
      font-size: 9px;
      font-weight: 800;
    }
    .number-dot.done { color: #fff; border-color: var(--blue); background: var(--blue); }
    .tips { margin: 0; padding-left: 17px; color: var(--muted); font-size: 10px; line-height: 1.65; }

    textarea.answer-area {
      width: 100%;
      min-height: 300px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 11px;
      outline: 0;
      resize: vertical;
      color: var(--ink);
      background: #fff;
      line-height: 1.7;
    }
    textarea.answer-area:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(36,107,253,.09); }
    .writing-bar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 9px; color: var(--muted); font-size: 11px; }
    .word-count.bad { color: var(--red); font-weight: 800; }
    .word-count.good { color: var(--green); font-weight: 800; }
    .rubric { display: grid; gap: 9px; margin-top: 18px; }
    .rubric label { display: flex; gap: 9px; align-items: flex-start; padding: 10px; border: 1px solid var(--line); border-radius: 9px; color: #4e5c73; font-size: 11px; line-height: 1.55; }
    .rubric input { margin-top: 2px; accent-color: var(--green); }
    .speaking-prompt { padding: 22px; border: 1px solid var(--line); border-radius: 13px; background: #fafbfe; white-space: pre-line; line-height: 1.75; }
    .big-timer { margin: 18px 0; color: var(--navy); font-size: 52px; font-weight: 900; text-align: center; font-variant-numeric: tabular-nums; letter-spacing: -.05em; }

    .result-hero {
      padding: 30px;
      border-radius: 18px;
      color: #fff;
      background: linear-gradient(130deg, #104f3b, #168a68);
      box-shadow: var(--shadow);
      text-align: center;
    }
    .score-ring {
      width: 142px;
      height: 142px;
      display: grid;
      place-items: center;
      margin: 8px auto 18px;
      border: 12px solid rgba(255,255,255,.18);
      border-radius: 50%;
      box-shadow: inset 0 0 0 4px rgba(255,255,255,.1);
    }
    .score-ring strong { font-size: 36px; }
    .result-hero h1 { margin-bottom: 7px; color: #fff; }
    .result-hero p { color: #d3f0e6; }
    .result-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 13px; margin: 18px 0; }
    .result-card { padding: 17px; border: 1px solid var(--line); border-radius: 13px; background: #fff; text-align: center; }
    .result-card strong { display: block; color: var(--navy); font-size: 23px; }
    .result-card span { color: var(--muted); font-size: 10px; }
    .review-item { padding: 13px 0; border-bottom: 1px solid var(--line); }
    .review-item:last-child { border-bottom: 0; }

    .notice {
      padding: 14px 16px;
      border: 1px solid #f0d69f;
      border-radius: 11px;
      color: #75500c;
      background: var(--amber-soft);
      font-size: 11px;
      line-height: 1.6;
    }
    .mock-library { display: grid; grid-template-columns: repeat(4, 1fr); gap: 13px; }
    .mock-choice {
      padding: 17px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: #fff;
      text-align: left;
      transition: .15s ease;
    }
    .mock-choice:hover { transform: translateY(-2px); border-color: #9bb8ed; box-shadow: var(--shadow); }
    .mock-choice strong { display: block; margin: 8px 0 5px; color: var(--navy); font-size: 14px; }
    .mock-choice span { color: var(--muted); font-size: 10px; line-height: 1.5; }
    .ai-actions { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; margin-top: 14px; }
    .ai-status { color: var(--muted); font-size: 11px; }

    function shuffle(arr, seed = Date.now()) {
      const copy = arr.slice();
      let x = Math.abs(seed) + 1;
      for (let i = copy.length - 1; i > 0; i--) {
        x = (x * 9301 + 49297) % 233280;

    async function apiPost(path, body) {
      if (!/^https?:$/.test(location.protocol)) {
        throw new Error("AI evaluation requires the local server. Run start-selt.ps1 and open http://127.0.0.1:8765.");
      }
      const response = await fetch(path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(payload.error || `Request failed (${response.status}).`);
      return payload;
    }

    function blobToDataURL(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    async function toggleSpeakingRecording(button) {
      if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
        button.disabled = true;
        button.textContent = "Preparing recording...";
        return;
      }
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const preferred = ["audio/webm;codecs=opus","audio/webm","audio/ogg;codecs=opus"].find(type => MediaRecorder.isTypeSupported(type));
        mediaRecorder = new MediaRecorder(mediaStream, preferred ? { mimeType: preferred } : undefined);
        audioChunks = [];
        recordingStartedAt = Date.now();
        mediaRecorder.ondataavailable = event => { if (event.data.size) audioChunks.push(event.data); };
        mediaRecorder.onstop = async () => {
          const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || "audio/webm" });
          state.answers.audioBase64 = await blobToDataURL(blob);
          state.answers.audioMimeType = blob.type;
          state.answers.audioDuration = Math.max(1, Math.round((Date.now() - recordingStartedAt) / 1000));
          state.answers.recording = false;
          state.answers.transcript = "";
          state.answers.aiEvaluation = null;
          mediaStream?.getTracks().forEach(track => track.stop());
          mediaRecorder = null;
          mediaStream = null;
          if (state.view === "mock") state.mock.answers[state.mock.step] = { ...state.answers };
          render();
        };
        state.answers.recording = true;
        mediaRecorder.start();
        button.textContent = "Stop recording";
        button.classList.add("recording-live");
        const status = document.getElementById("aiStatus");
        if (status) status.textContent = "Recording now. Speak naturally and complete the task.";
      } catch (error) {
        state.answers.aiError = error.name === "NotAllowedError" ? "Microphone permission was not granted." : error.message;
        render();
      }
    }

              <p>Complete 30 Listening questions, 30 Reading questions, two Writing tasks and all four Speaking stages. Each numbered mock uses a different fixed combination.</p>
              <div class="mock-specs"><span>142 minutes each</span><span>AI writing & speaking</span><span>Saved result</span></div>
            </div>
            <button class="btn btn-light" data-start-mock="full-0">Begin Mock 1</button>
          </article>
          <article class="panel">
            <div class="panel-head"><h3>Test map</h3><span class="tag blue">A2–C1</span></div>
            <div class="exam-map">
              ${Object.entries(OFFICIAL).map(([key,o],i) => `<div class="exam-row"><div class="exam-num">0${i+1}</div><div><strong>${SKILLS[key].title}</strong><span>${o.label}</span></div><span class="tag">${o.minutes} min</span></div>`).join("")}
            </div>
          </article>
        </div>
        <div class="section-title-row"><h2>Eight full mock tests</h2><span class="tag blue">Different fixed papers</span></div>
        <div class="mock-library">
          ${FULL_MOCKS.map(mock => `<button class="mock-choice" data-start-mock="full-${mock.id}"><span class="tag ${mock.id===7?"amber":"blue"}">${String(mock.id+1).padStart(2,"0")} · 142 min</span><strong>${mock.name}</strong><span>${mock.focus}<br>60 objective questions + Writing + Speaking</span></button>`).join("")}
        </div>
        <div class="notice" style="margin-top:18px"><strong>About the questions:</strong> This platform does not reproduce confidential live exam items. It uses original material written to match the published task types, timings and everyday General SELT contexts. Official practice papers remain the best source for authorised past-paper-style material.</div>`;
    }

    function renderSkill() {
      const skill = SKILLS[state.skill], tasks = PRACTICE_TASKS[state.skill], official = OFFICIAL[state.skill];
      return `
        <div class="page-head"><div><div class="eyebrow">${official.minutes}-minute exam section</div><h1>${skill.title} practice</h1><p class="lead">${skill.desc} Choose focused practice for instant review, or take a timed section mock with the published number of tasks.</p></div><button class="btn btn-primary" data-start-mock="${state.skill}">Start ${official.minutes}-minute mock</button></div>
        <div class="task-grid">
          ${tasks.map((t,i) => `<article class="task-card">
            <div class="task-top"><span class="task-number">Practice ${String(i+1).padStart(2,"0")}</span><span class="tag ${state.completed[`${state.skill}:${t.id}`] ? "green" : "blue"}">${state.completed[`${state.skill}:${t.id}`] ? "Completed" : t.meta}</span></div>
            <h3>${t.title}</h3><p>${t.desc}</p>
            <button class="btn btn-outline" data-open-task="${t.id}">${state.completed[`${state.skill}:${t.id}`] ? "Practise again" : "Start practice"}</button>
          </article>`).join("")}
        </div>
        <div class="panel" style="margin-top:18px">
          <div class="panel-head"><h3>Fresh variant</h3><span class="tag amber">Question bank</span></div>
          <p class="lead" style="font-size:12px">Each time you choose “new variant”, the platform draws a different set or prompt from the bank. Your completed task types remain saved on this device.</p>
        </div>`;
    }

    function buildTask(skill, id, variant = 0) {
      if (skill === "listening") {
        if (id === "l1") return { title: "Listening Part 1 · Dialogue completions", instructions: "Listen to each unfinished dialogue and choose the most appropriate completion. In the exam, each part is played twice.", type: "mcq-audio-items", items: shuffle(L1, variant + 71).slice(0,7).map((x,i) => ({ audio: x[0], q: `Choose the best continuation for dialogue ${i+1}.`, options:x[1], answer:x[2], explanation:x[3] })) };
        if (id === "l2") {
          const chosen = shuffle(L2, variant + 91).slice(0,5);
          return { title: "Listening Part 2 · Conversations", instructions: "Listen to five conversations and answer two questions about each.", type:"audio-groups", groups:chosen };
        }
        if (id === "l3") {
          const x = L3[variant % L3.length];
          return { title:`Listening Part 3 · ${x.title}`, instructions:"Listen and complete each note using no more than three words.", type:"audio-notes", audio:x.audio, notes:x.notes };
        }
        const x = L4[variant % L4.length];
        return { title:`Listening Part 4 · ${x.title}`, instructions:"Listen to the discussion and answer six questions. Focus on opinion, reason and agreement.", type:"audio-discussion", audio:x.audio, questions:x.questions };
      }
      if (skill === "reading") {
        if (id === "r1a") return { title:"Reading Part 1a · Vocabulary in context", instructions:"Choose the word that can replace the highlighted word without changing the meaning.", type:"mcq", questions:shuffle(R1A, variant + 113).slice(0,6).map(x => ({q:x[0],options:x[1],answer:x[2],explanation:x[3]})) };
        if (id === "r1b") {
          const x = CLOZE[variant % CLOZE.length];
          return { title:`Reading Part 1b · ${x.title}`, instructions:"Choose the best word for each gap.", type:"cloze", text:x.text, gaps:x.gaps };
        }
        if (id === "r2") {
          const x = INSERTION[variant % INSERTION.length];
          return { title:`Reading Part 2 · ${x.title}`, instructions:"Choose the sentence that best fits each numbered gap. Two sentences are extra.", type:"insertion", ...x };
        }
        if (id === "r3") {
          const x = MATCHING[variant % MATCHING.length];
          return { title:`Reading Part 3 · ${x.title}`, instructions:"Read texts A–D. For each question, choose the person or place that matches.", type:"matching", ...x };
        }
        const x = LONG_READS[variant % LONG_READS.length];
        return { title:`Reading Part 4 · ${x.title}`, instructions:"Read the text and answer six four-option questions.", type:"longread", ...x };
      }
      if (skill === "writing") {
        const formal = id === "w1", bank = formal ? WRITING.formal : WRITING.informal;
        return { title:`Writing ${formal ? "Part 1 · Formal response" : "Part 2 · Informal writing"}`, instructions:`Write ${formal ? "100–150" : "150–200"} words. Allow time to plan and check your work.`, type:"writing", prompt:bank[variant % bank.length], min:formal?100:150, max:formal?150:200 };
      }
      const index = variant % SPEAKING.personal.length;
      if (id === "s1") return { title:"Speaking Part 1 · Personal questions", instructions:"Answer naturally. Develop each response with a reason, example or detail.", type:"speaking", prompt:SPEAKING.personal[index], prep:0, talk:180 };
      if (id === "s2") return { title:"Speaking Part 2 · Role-plays", instructions:"Take an active part. Ask questions, clarify details and work towards an outcome.", type:"speaking", prompt:SPEAKING.roleplay[variant % SPEAKING.roleplay.length], prep:20, talk:180 };
      if (id === "s3") return { title:"Speaking Part 3 · Read aloud", instructions:"Read clearly and naturally. Then summarise the main message and imagine two follow-up questions.", type:"speaking", prompt:SPEAKING.readaloud[variant % SPEAKING.readaloud.length], prep:20, talk:120 };
      return { title:"Speaking Part 4 · Presentation", instructions:"You have 30 seconds to prepare. Speak for one to two minutes, then answer follow-up questions.", type:"speaking", prompt:SPEAKING.presentation[variant % SPEAKING.presentation.length], prep:30, talk:120 };
    }

    function renderTask() {
      const task = buildTask(state.skill, state.taskId, state.variant);
      const count = taskQuestionCount(task), answered = answeredCount(task, state.answers);
      const practiceScore = state.checked && count ? scoreTask(task, state.answers) : null;
      return `<div class="exam-layout">
        <section class="exam-paper">
          <div class="exam-header"><div><span class="tag blue">${practiceScore ? `Score ${practiceScore.correct}/${practiceScore.total}` : state.mode === "practice" ? "Practice mode" : "Timed"}</span><h2>${task.title}</h2><p>${task.instructions}</p></div>${state.timer !== null ? `<div class="timer" id="mainTimer">${fmt(state.timer)}</div>` : ""}</div>
          <div class="exam-body">${renderTaskBody(task, false)}</div>
          <div class="exam-actions"><div class="action-group"><button class="btn btn-outline" data-back-skill>Exit</button><button class="btn btn-outline" data-new-variant>New variant</button></div><div class="action-group">${state.checked ? `<button class="btn btn-primary" data-try-again>Try again</button>` : `<button class="btn btn-primary" data-check-task>${task.type === "writing" || task.type === "speaking" ? "Open self-review" : "Check answers"}</button>`}</div></div>
        </section>
        <aside class="exam-side">
          <div class="side-panel"><h3>Progress</h3><div class="progress-line"><span style="width:${count ? Math.round(answered/count*100) : 0}%"></span></div><div class="side-meta"><span>${answered} answered</span><span>${count || "Self-review"} items</span></div></div>
          ${count ? `<div class="side-panel"><h3>Question navigator</h3><div class="number-grid">${Array.from({length:count},(_,i)=>`<span class="number-dot ${isAnswered(state.answers[i]) ? "done" : ""}">${i+1}</span>`).join("")}</div></div>` : ""}
          <div class="side-panel"><h3>Exam habit</h3><ul class="tips">${tipsFor(state.skill).map(t=>`<li>${t}</li>`).join("")}</ul></div>
        </aside>
      </div>`;
    }

    function taskQuestionCount(task) {
      if (task.items) return task.items.length;
      if (task.questions) return task.questions.length;
      if (task.notes) return task.notes.length;
      if (task.gaps) return task.gaps.length;
      if (task.type === "insertion" && task.answers) return task.answers.length;
      if (task.groups) return task.groups.reduce((n,g)=>n+g.questions.length,0);
      return 0;
    }
    function isAnswered(v) { return v !== undefined && v !== null && String(v).trim() !== ""; }
    function answeredCount(task, answers) {
      if (task.type === "writing") return wordCount(answers.text) ? 1 : 0;
      if (task.type === "speaking") return answers.reviewed ? 1 : 0;
      return Array.from({ length: taskQuestionCount(task) }, (_, i) => answers?.[i]).filter(isAnswered).length;
    }
    function tipsFor(skill) {
      return {
        listening:["Read the question before pressing play.","Expect paraphrase, not repeated wording.","Check spelling in note completion."],
        reading:["Use context before choosing vocabulary.","Track reference words in missing-sentence tasks.","Do not spend too long on one item."],
        writing:["Plan content points before writing.","Match the reader and purpose.","Leave two minutes to edit."],
        speaking:["Extend answers with reasons and examples.","Initiate as well as respond in role-plays.","Keep speaking after a small mistake."]
      }[skill];
    }

    function renderTaskBody(task, mockMode) {
      const checked = state.checked && !mockMode;
      if (task.type === "mcq") return task.questions.map((q,i)=>renderMCQ(q,i,checked,mockMode)).join("");
      if (task.type === "mcq-audio-items") return task.items.map((q,i)=>`<div class="audio-box"><div><strong>Dialogue ${i+1}</strong><span>Use headphones if available · playback ${playCount(i,mockMode)}/2</span></div><button class="audio-btn" data-play-item="${i}">▶ Play audio</button></div>${renderMCQ(q,i,checked,mockMode)}`).join("");
      if (task.type === "audio-groups") {
        let idx = 0;
        return task.groups.map((g,gi)=>`<div class="audio-box"><div><strong>Conversation ${gi+1} · ${g.title}</strong><span>Two questions · playback ${playCount(`g${gi}`,mockMode)}/2</span></div><button class="audio-btn" data-play-group="${gi}">▶ Play audio</button></div>${g.questions.map(q=>renderMCQ({q:q[0],options:q[1],answer:q[2],explanation:q[3]},idx++,checked,mockMode)).join("")}`).join("");
      }
      if (task.type === "audio-notes") return `<div class="audio-box"><div><strong>${task.title.replace("Listening Part 3 · ","")}</strong><span>One monologue · playback ${playCount("main",mockMode)}/2</span></div><button class="audio-btn" data-play-main>▶ Play audio</button></div>${task.notes.map((n,i)=>renderShort(n[0],n[1],i,checked,mockMode)).join("")}`;
      if (task.type === "audio-discussion") return `<div class="audio-box"><div><strong>Group discussion</strong><span>Long recording · playback ${playCount("main",mockMode)}/2</span></div><button class="audio-btn" data-play-main>▶ Play audio</button></div>${task.questions.map((q,i)=>renderMCQ({q:q[0],options:q[1],answer:q[2],explanation:q[3]},i,checked,mockMode)).join("")}`;
      if (task.type === "cloze") return `<div class="source-box">${renderGapText(task.text)}</div>${task.gaps.map((g,i)=>renderMCQ({q:`Choose the best word for gap ${i+1}.`,options:g[0],answer:g[1],explanation:"Check grammar, meaning and the words immediately around the gap."},i,checked,mockMode)).join("")}`;
      if (task.type === "insertion") return `<div class="source-box">${task.paragraphs.join("\n\n")}</div><div class="source-box" style="font-family:inherit;font-size:12px">${task.sentences.join("\n")}</div>${task.answers.map((a,i)=>renderMCQ({q:`Which sentence fits gap ${i+1}?`,options:task.sentences,answer:a,explanation:"Look for pronoun reference, linking language and the flow of ideas."},i,checked,mockMode)).join("")}`;
      if (task.type === "matching") return `<div class="source-box" style="font-family:inherit;font-size:12px">${task.texts.join("\n\n")}</div>${task.questions.map((q,i)=>renderMCQ({q:q[0],options:task.texts.map(t=>t.slice(0,1)),answer:q[1],explanation:"Match the precise detail, not only the general topic."},i,checked,mockMode)).join("")}`;
      if (task.type === "longread") return `<div class="source-box">${esc(task.text)}</div>${task.questions.map((q,i)=>renderMCQ({q:q[0],options:q[1],answer:q[2],explanation:q[3]},i,checked,mockMode)).join("")}`;
      if (task.type === "writing") {
        const text = state.answers.text || "", wc = wordCount(text), good = wc >= task.min && wc <= task.max;
        return `<div class="instruction">${esc(task.prompt).replace(/\n/g,"<br>")}</div><textarea class="answer-area" data-writing placeholder="Write your response here...">${esc(text)}</textarea><div class="writing-bar"><span>Target: ${task.min}–${task.max} words</span><span class="word-count ${wc ? (good ? "good":"bad") : ""}" id="wordCount">${wc} words</span></div>
          <div class="ai-actions"><button class="btn btn-primary" data-ai-writing ${wc<35?"disabled":""}>${state.answers.aiEvaluation ? "Evaluate again" : "Evaluate writing with AI"}</button><span class="ai-status" id="aiStatus">${state.answers.aiEvaluation ? (mockMode ? "AI score saved for final results." : "Practice estimate generated.") : "Requires the secure local server and a configured Groq key."}</span></div>
          ${state.answers.aiError ? `<div class="notice" style="margin-top:12px">${esc(state.answers.aiError)}</div>` : ""}
          ${state.answers.aiEvaluation && !mockMode ? renderAIReport(state.answers.aiEvaluation,"writing") : ""}
          ${checked ? renderRubric("writing") : ""}`;
      }
      if (task.type === "speaking") return `<div class="speaking-prompt">${esc(task.prompt)}</div><div class="big-timer" id="speakTimer">${fmt(state.answers.speakSeconds ?? (task.prep || task.talk))}</div><div class="action-group" style="justify-content:center"><button class="btn btn-primary" data-start-speaking>${task.prep ? `Start ${task.prep}s preparation` : "Start response timer"}</button><button class="btn btn-outline" data-reset-speaking>Reset timer</button></div>
        <div class="recording-panel"><strong>AI speaking evaluation</strong><p style="margin:5px 0 10px;color:#75500c;font-size:11px">Record your answer. Groq transcribes the audio, then evaluates the transcript. Pronunciation is not scored from transcript alone.</p><div class="ai-actions"><button class="btn btn-danger" data-record-speaking>${state.answers.recording ? "Stop recording" : "Start recording"}</button>${state.answers.audioBase64 ? `<button class="btn btn-primary" data-ai-speaking>${state.answers.aiEvaluation ? "Evaluate again" : "Transcribe & evaluate"}</button>`:""}<span class="ai-status" id="aiStatus">${state.answers.recording ? "Recording now..." : state.answers.audioBase64 ? "Recording ready." : "Microphone permission is required."}</span></div>${state.answers.transcript ? `<div class="transcript-box"><strong>Transcript</strong><br>${esc(state.answers.transcript)}</div>`:""}${state.answers.aiError ? `<div class="notice" style="margin-top:12px">${esc(state.answers.aiError)}</div>`:""}${state.answers.aiEvaluation && !mockMode ? renderAIReport(state.answers.aiEvaluation,"speaking"):""}</div>
        ${checked ? renderRubric("speaking") : ""}`;
      return "";
    }

    function renderAIReport(report,type) {
      const labels = {
        taskAchievement:"Task achievement", organisation:"Organisation", grammar:"Grammar",
        vocabulary:"Vocabulary", registerAndMechanics:"Register & mechanics",
        taskFulfilment:"Task fulfilment", fluencyAndCoherence:"Fluency & coherence",
        interactiveCommunication:"Interaction", pronunciation:"Pronunciation"
      };
      return `<section class="ai-report"><div class="ai-score-row"><div class="ai-score">${report.overall}/100</div><div><span class="tag blue">AI practice estimate · ${esc(report.estimatedLevel)}</span><h3>${type==="writing"?"Writing examiner report":"Speaking examiner report"}</h3><p>${esc(report.summary)}</p></div></div>
        <div class="criteria-grid">${Object.entries(report.criteria||{}).map(([key,value])=>`<div class="criterion">${labels[key]||key}<strong>${value===null?"N/A":value}</strong></div>`).join("")}</div>
        <div class="feedback-cols"><div class="feedback-box"><h4>What worked</h4><ul>${(report.strengths||[]).map(x=>`<li>${esc(x)}</li>`).join("")||"<li>No strengths returned.</li>"}</ul></div><div class="feedback-box"><h4>Improve next</h4><ul>${(report.improvements||[]).map(x=>`<li>${esc(x)}</li>`).join("")||"<li>No improvements returned.</li>"}</ul></div></div>
        ${report.pronunciationNote?`<div class="notice" style="margin-top:12px">${esc(report.pronunciationNote)}</div>`:""}
        <p style="margin-top:12px"><strong>Important:</strong> AI feedback is a practice estimate, not an official LanguageCert result.</p></section>`;
    }

    function renderGapText(text) { return esc(text).replace(/\[(\d)\]/g, "<strong style='color:var(--blue)'>[$1]</strong>"); }
    function currentAnswer(index, mockMode) {
      if (mockMode) return state.mock.answers[state.mock.step]?.[index];
      return state.answers[index];
    }
    function renderMCQ(q,index,checked,mockMode) {
      const selected = currentAnswer(index,mockMode);
      return `<div class="question"><div class="q-label">Question ${index+1}</div><div class="q-text">${q.q}</div><div class="options">${q.options.map((o,oi)=>{
        let cls = "option";
        if (checked && oi === q.answer) cls += " correct";
        else if (checked && oi === selected) cls += " incorrect";
        else if (selected === oi) cls += " selected";
        return `<label class="${cls}"><input type="radio" name="${mockMode?"m":"p"}q${state.mock?.step ?? ""}_${index}" data-answer="${index}:${oi}" ${selected===oi?"checked":""} ${checked?"disabled":""}><span>${o}</span></label>`;
      }).join("")}</div>${checked ? `<div class="feedback ${selected===q.answer?"good":"bad"}">${selected===q.answer?"Correct.":`Correct answer: ${q.options[q.answer]}`} <span class="explanation">${q.explanation || ""}</span></div>`:""}</div>`;
    }
    function renderShort(label,accepted,index,checked,mockMode) {
      const value = currentAnswer(index,mockMode) || "", good = checked && answerMatches(value,accepted);
      return `<div class="question"><div class="q-label">Question ${index+1}</div><div class="q-text">${label}</div><input class="short-input ${checked?(good?"correct":"incorrect"):""}" data-short="${index}" value="${esc(value)}" placeholder="No more than three words" ${checked?"disabled":""}>${checked?`<div class="feedback ${good?"good":"bad"}">${good?"Correct.":`Suggested answer: ${accepted[0]}.`}</div>`:""}</div>`;
    }
    function renderRubric(type) {
      const items = type === "writing" ? [
        "I covered every content point in the prompt.", "My tone and register suit the reader and purpose.",
        "My ideas are organised into clear paragraphs.", "I used varied grammar and precise vocabulary.",
        "I checked agreement, tense, spelling and punctuation.", "I stayed within the required word range."
      ] : [
        "I answered fully rather than using one short sentence.", "I gave reasons, examples or supporting detail.",
        "I used linking language to organise longer answers.", "I initiated interaction where the task required it.",
        "My pace and pronunciation were generally easy to follow.", "I recovered naturally when I hesitated or made a mistake."
      ];
      return `<div class="rubric"><h3 style="margin:8px 0 0">Self-review checklist</h3>${items.map((x,i)=>`<label><input type="checkbox" data-rubric="${i}" ${state.answers.rubric?.[i]?"checked":""}>${x}</label>`).join("")}<div class="notice">Writing and speaking need human assessment. This checklist helps you review performance, but it is not an official LanguageCert score.</div></div>`;
    }
    function playCount(key,mockMode) {
      const plays = mockMode ? (state.mock.plays[state.mock.step] || {}) : (state.answers.plays || {});
      return plays[key] || 0;
    }

    function startSectionMock(skill) {
      clearTimer();
      const sequence = PRACTICE_TASKS[skill].map(t => ({ skill, id:t.id, task:buildTask(skill,t.id,Date.now()+t.id.charCodeAt(1)) }));
      state = { ...state, view:"mock", skill, mode:"section", answers:{}, checked:false, timer:OFFICIAL[skill].minutes*60, mock:{ type:"section", skill, step:0, sequence, answers:{}, plays:{}, started:Date.now(), sectionScores:{} } };
      render();
    }
    function startFullMock(mockId = 0) {
      clearTimer();
      const paper = FULL_MOCKS[Number(mockId)] || FULL_MOCKS[0];
      const seed = paper.seed;
      const sequence = [];
      ["listening","reading","writing","speaking"].forEach(skill => PRACTICE_TASKS[skill].forEach(t => sequence.push({skill,id:t.id,task:buildTask(skill,t.id,seed+t.id.charCodeAt(1))})));
      state = { ...state, view:"mock", skill:"listening", mode:"full", answers:{}, checked:false, timer:142*60, mock:{ type:"full", mockId:paper.id, mockName:paper.name, step:0, sequence, answers:{}, plays:{}, started:Date.now(), sectionScores:{} } };
      render();
    }
    function renderMock() {
      const m = state.mock, entry = m.sequence[m.step], task = entry.task;
      state.skill = entry.skill;
      state.answers = m.answers[m.step] || {};
      const count = taskQuestionCount(task), answered = answeredCount(task,state.answers);
      return `<div class="exam-layout">
        <section class="exam-paper">
          <div class="exam-header"><div><span class="tag amber">${m.type === "full" ? m.mockName : `${SKILLS[m.skill].title} mock`} · Task ${m.step+1}/${m.sequence.length}</span><h2>${task.title}</h2><p>${task.instructions}</p></div><div class="timer ${state.timer<120?"warn":""}" id="mainTimer">${fmt(state.timer)}</div></div>
          <div class="exam-body">${renderTaskBody(task,true)}</div>
          <div class="exam-actions"><div class="action-group"><button class="btn btn-danger" data-end-mock>End mock</button>${m.step>0?`<button class="btn btn-outline" data-mock-prev>Previous</button>`:""}</div><div class="action-group">${m.step<m.sequence.length-1?`<button class="btn btn-primary" data-mock-next>Save & next</button>`:`<button class="btn btn-primary" data-finish-mock>Finish mock</button>`}</div></div>
        </section>
        <aside class="exam-side">
          <div class="side-panel"><h3>Test progress</h3><div class="progress-line"><span style="width:${Math.round((m.step+1)/m.sequence.length*100)}%"></span></div><div class="side-meta"><span>${SKILLS[entry.skill].title}</span><span>${m.step+1}/${m.sequence.length} tasks</span></div></div>
          <div class="side-panel"><h3>Current task</h3><div class="number-grid">${Array.from({length:Math.max(count,1)},(_,i)=>`<span class="number-dot ${isAnswered(state.answers[i])?"done":""}">${i+1}</span>`).join("")}</div><div class="side-meta"><span>${answered} answered</span><span>${count || "Self-assessed"}</span></div></div>
          <div class="side-panel"><h3>Mock rules</h3><ul class="tips"><li>Audio is limited to two plays.</li><li>Answers are not shown until the end.</li><li>The timer continues across every task.</li></ul></div>
        </aside>
      </div>`;
    }

    function scoreTask(task, answers) {
      let correct = 0, total = taskQuestionCount(task);
      const check = (idx, expected) => { if (answers[idx] === expected) correct++; };
      if (["mcq","mcq-audio-items"].includes(task.type)) (task.questions || task.items).forEach((q,i)=>check(i,q.answer));
      if (task.type === "audio-groups") { let n=0; task.groups.forEach(g=>g.questions.forEach(q=>check(n++,q[2]))); }
      if (task.type === "audio-notes") task.notes.forEach((n,i)=>{ if(answerMatches(answers[i],n[1])) correct++; });
      if (task.type === "audio-discussion" || task.type === "longread") task.questions.forEach((q,i)=>check(i,q[2]));
      if (task.type === "cloze") task.gaps.forEach((g,i)=>check(i,g[1]));
      if (task.type === "insertion") task.answers.forEach((a,i)=>check(i,a));
      if (task.type === "matching") task.questions.forEach((q,i)=>check(i,q[1]));
      return { correct, total };
    }
    function finishMock() {
      clearTimer();
      state.mock.answers[state.mock.step] = { ...state.answers };
      const bySkill = {};
      state.mock.sequence.forEach((entry,i) => {
        const score = scoreTask(entry.task,state.mock.answers[i] || {});
        if (!bySkill[entry.skill]) bySkill[entry.skill] = {correct:0,total:0,written:0};
        bySkill[entry.skill].correct += score.correct;
        bySkill[entry.skill].total += score.total;
        if (entry.task.type === "writing" && wordCount((state.mock.answers[i]||{}).text)) bySkill[entry.skill].written++;
      });
      const result = { date:new Date().toISOString(), type:state.mock.type, skill:state.mock.skill, mockId:state.mock.mockId, mockName:state.mock.mockName, bySkill, duration:Math.round((Date.now()-state.mock.started)/1000), sequence:state.mock.sequence, answers:state.mock.answers };
      state.history.unshift({ date:result.date, type:result.type, skill:result.skill, bySkill:result.bySkill });
      state.history = state.history.slice(0,10);
      state.result = result;
      state.view = "results";
      saveState();
      render();
    }
    function renderResults() {
      const r = state.result;
      if (!r) return renderHome();
      const scored = Object.values(r.bySkill).reduce((a,s)=>({correct:a.correct+s.correct,total:a.total+s.total}),{correct:0,total:0});
      const pct = scored.total ? Math.round(scored.correct/scored.total*100) : 0;
      const aiScores = { writing:[], speaking:[] };
      r.sequence.forEach((entry,i)=>{ const score=r.answers[i]?.aiEvaluation?.overall; if(Number.isFinite(score)&&aiScores[entry.skill]) aiScores[entry.skill].push(score); });
      const aiAverage = skill => aiScores[skill]?.length ? Math.round(aiScores[skill].reduce((a,b)=>a+b,0)/aiScores[skill].length) : null;
      return `<div class="result-hero"><span class="tag" style="background:rgba(255,255,255,.14);color:#fff">${esc(r.mockName || "Practice result")}</span><div class="score-ring"><strong>${scored.total?pct+"%":"Done"}</strong></div><h1>${pct>=75?"Strong performance":pct>=60?"Good progress":"Keep building accuracy"}</h1><p>${scored.correct}/${scored.total} objective answers correct. Writing and speaking show AI estimates when submitted.</p></div>
        <div class="result-grid">${Object.entries(r.bySkill).map(([skill,s])=>{const ai=aiAverage(skill);return `<div class="result-card"><strong>${s.total?Math.round(s.correct/s.total*100)+"%":ai!==null?ai+"/100":"Not scored"}</strong><span>${SKILLS[skill].title} · ${s.total?`${s.correct}/${s.total} objective`:"AI practice estimate"}</span></div>`;}).join("")}</div>
        <div class="dashboard-grid">
          <section class="panel"><div class="panel-head"><h3>What this score means</h3><span class="tag amber">Practice estimate</span></div><p class="lead" style="font-size:12px">This percentage measures only objective questions in this practice set. Official General SELT results use the LanguageCert Global Scale and assess each skill separately. Your target of ${state.target} corresponds to the published UKVI minimum of ${state.target==="B1"?40:state.target==="B2"?60:75} in each required skill.</p><div class="notice" style="margin-top:15px">Do not treat this practice result as an official predicted score. Use it to identify task types that need more work.</div></section>
          <section class="panel"><div class="panel-head"><h3>Next action</h3></div><div class="action-group"><button class="btn btn-primary" data-nav="home">Dashboard</button><button class="btn btn-outline" data-start-mock="${r.type==="full"?`full-${r.mockId ?? 0}`:r.skill}">Repeat this mock</button></div></section>
        </div>`;
    }

    function renderFormat() {
      return `<div class="page-head"><div><div class="eyebrow">Published exam structure</div><h1>General SELT format</h1><p class="lead">The General SELT (A2–C1) is a multilevel, four-skill UKVI test. The full duration is approximately 2 hours 22 minutes.</p></div></div>
        <div class="task-grid">${Object.entries(SKILLS).map(([key,s])=>`<article class="task-card"><div class="task-top"><span class="task-number">${s.title}</span><span class="tag blue">${OFFICIAL[key].minutes} min</span></div><h3>${OFFICIAL[key].label}</h3><p>${formatDetail(key)}</p><button class="btn btn-outline" data-open-skill="${key}">Open practice</button></article>`).join("")}</div>
        <div class="panel" style="margin-top:18px"><h3>UKVI target scores</h3><p class="lead" style="font-size:12px">LanguageCert currently publishes minimum scores per skill of 40 for B1, 60 for B2 and 75 for C1 for relevant General SELT visa routes. Always check the exact visa requirement before booking.</p><p style="margin:14px 0 0;font-size:12px"><a href="https://selt.languagecert.org/general-a2-c1-test" target="_blank" rel="noopener" style="color:var(--blue);font-weight:800">Open the official General SELT page ↗</a></p></div>`;
    }
    function formatDetail(key) {
      return {
        listening:"7 dialogue completions; 5 conversations with 2 questions each; 7 note gaps; 6 discussion questions. Each part is played twice.",
        reading:"6 vocabulary questions; 5 cloze questions; 6 missing sentences; 7 multiple-matching questions; 6 long-text questions.",
        writing:"A 100–150 word formal or neutral response and a 150–200 word informal piece.",
        speaking:"Personal questions; two role-play situations; read aloud with questions; prepared one-to-two-minute presentation."
      }[key];
    }

    function startPractice(skill,id) {
      state.view="task"; state.skill=skill; state.mode="practice"; state.taskId=id; state.variant=Date.now()%10000; state.answers={plays:{}}; state.checked=false; state.timer=null;
      render();
    }
    function checkPractice() {
      state.checked = true;
      state.completed[`${state.skill}:${state.taskId}`] = true;
      saveState();
      render();
    }
    function clearTimer(reset=true) {
      if (state.timerId) clearInterval(state.timerId);
      state.timerId = null;
      if (reset && state.view !== "mock") state.timer = null;
    }
    function startTimerTick() {
      if (state.timerId) return;
      state.timerId = setInterval(() => {
        state.timer = Math.max(0,(state.timer||0)-1);
        const el = document.getElementById("mainTimer");
        if (el) { el.textContent=fmt(state.timer); el.classList.toggle("warn",state.timer<120); }
        if (state.timer === 0) {
          clearTimer(false);
          if (state.view === "mock") finishMock(); else { state.checked=true; render(); }
        }
      },1000);
    }
    function playAudio(text,key) {
      const mockMode = state.view === "mock";
      const plays = mockMode ? (state.mock.plays[state.mock.step] ||= {}) : (state.answers.plays ||= {});
      if ((plays[key] || 0) >= 2) return;
      speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "en-GB";
      utter.rate = .92;
      utter.pitch = 1;
      plays[key] = (plays[key] || 0) + 1;
      speechSynthesis.speak(utter);
      render();
    }
    function currentTask() {
      return state.view === "mock" ? state.mock.sequence[state.mock.step].task : buildTask(state.skill,state.taskId,state.variant);
    }
    function saveMockStep() { state.mock.answers[state.mock.step] = { ...state.answers }; }

    function bindEvents() {
      document.querySelectorAll("[data-nav]").forEach(el => el.addEventListener("click", () => {
        const k=el.dataset.nav;
        if(k==="home"){ state.view="home";state.skill=null; }
        else if(k==="format"){state.view="format";state.skill=null;}
        else {state.view="skill";state.skill=k;}
        state.mock=null; state.answers={}; render();
      }));
      document.querySelectorAll("[data-open-skill]").forEach(el => el.addEventListener("click",()=>{state.view="skill";state.skill=el.dataset.openSkill;state.mock=null;render();}));
      document.querySelectorAll("[data-open-task]").forEach(el => el.addEventListener("click",()=>startPractice(state.skill,el.dataset.openTask)));
      document.querySelectorAll("[data-start-mock]").forEach(el => el.addEventListener("click",()=>{
        const value = el.dataset.startMock;
        if (value.startsWith("full-")) startFullMock(Number(value.split("-")[1]));
        else startSectionMock(value);
      }));
      document.querySelector("[data-back-skill]")?.addEventListener("click",()=>{state.view="skill";state.answers={};render();});
      document.querySelector("[data-new-variant]")?.addEventListener("click",()=>{state.variant++;state.answers={plays:{}};state.checked=false;render();});
      document.querySelector("[data-try-again]")?.addEventListener("click",()=>{state.answers={plays:{}};state.checked=false;render();});
      document.querySelector("[data-check-task]")?.addEventListener("click",checkPractice);

      document.querySelectorAll("[data-answer]").forEach(input => input.addEventListener("change", () => {
        const [i,v]=input.dataset.answer.split(":").map(Number); state.answers[i]=v;
        if(state.view==="mock") state.mock.answers[state.mock.step]={...state.answers};
        render();
      }));
      document.querySelectorAll("[data-short]").forEach(input => input.addEventListener("input", () => {
        state.answers[Number(input.dataset.short)]=input.value;
        if(state.view==="mock") state.mock.answers[state.mock.step]={...state.answers};
      }));
      document.querySelector("[data-writing]")?.addEventListener("input", e => {
        state.answers.text=e.target.value;
        if(state.view==="mock") state.mock.answers[state.mock.step]={...state.answers};
        const wc=wordCount(e.target.value), task=currentTask(), el=document.getElementById("wordCount");
        if(el){el.textContent=`${wc} words`;el.className=`word-count ${wc>=task.min&&wc<=task.max?"good":wc?"bad":""}`;}
        const aiButton=document.querySelector("[data-ai-writing]");
        if(aiButton) aiButton.disabled=wc<35;
      });
      document.querySelectorAll("[data-rubric]").forEach(input=>input.addEventListener("change",()=>{
        state.answers.rubric ||= []; state.answers.rubric[Number(input.dataset.rubric)]=input.checked; state.answers.reviewed=true;
      }));

      if (!["task","mock"].includes(state.view)) return;
      const task = currentTask();
      document.querySelectorAll("[data-play-item]").forEach(btn=>btn.addEventListener("click",()=>playAudio(task.items[Number(btn.dataset.playItem)].audio,Number(btn.dataset.playItem))));
      document.querySelectorAll("[data-play-group]").forEach(btn=>{const i=Number(btn.dataset.playGroup);btn.addEventListener("click",()=>playAudio(task.groups[i].audio,`g${i}`));});
      document.querySelector("[data-play-main]")?.addEventListener("click",()=>playAudio(task.audio,"main"));
      document.querySelector("[data-ai-writing]")?.addEventListener("click",event=>evaluateWritingWithAI(task,event.currentTarget));
      document.querySelector("[data-record-speaking]")?.addEventListener("click",event=>toggleSpeakingRecording(event.currentTarget));
      document.querySelector("[data-ai-speaking]")?.addEventListener("click",event=>evaluateSpeakingWithAI(task,event.currentTarget));

      document.querySelector("[data-mock-next]")?.addEventListener("click",()=>{saveMockStep();state.mock.step++;state.skill=state.mock.sequence[state.mock.step].skill;state.answers=state.mock.answers[state.mock.step]||{};render();});
      document.querySelector("[data-mock-prev]")?.addEventListener("click",()=>{saveMockStep();state.mock.step--;state.skill=state.mock.sequence[state.mock.step].skill;state.answers=state.mock.answers[state.mock.step]||{};render();});
      document.querySelector("[data-finish-mock]")?.addEventListener("click",finishMock);
      document.querySelector("[data-end-mock]")?.addEventListener("click",()=>{if(confirm("End this mock and show the current result?"))finishMock();});
      bindSpeaking(task);
    }

    function bindSpeaking(task) {
      if (task.type !== "speaking") return;
      let speechId = null;
      const reset = () => {
        if(speechId) clearInterval(speechId);
        state.answers.speakPhase = task.prep ? "prep" : "talk";
        state.answers.speakSeconds = task.prep || task.talk;
        const el=document.getElementById("speakTimer"); if(el) el.textContent=fmt(state.answers.speakSeconds);
      };
      document.querySelector("[data-reset-speaking]")?.addEventListener("click",reset);
      document.querySelector("[data-start-speaking]")?.addEventListener("click",e=>{
        if(speechId)return;
        if(state.answers.speakSeconds===undefined) reset();
        e.target.textContent = state.answers.speakPhase==="prep" ? "Preparing..." : "Speaking...";
        speechId=setInterval(()=>{
          state.answers.speakSeconds--;
          const el=document.getElementById("speakTimer");if(el)el.textContent=fmt(state.answers.speakSeconds);
          if(state.answers.speakSeconds<=0){
            clearInterval(speechId);speechId=null;
            if(state.answers.speakPhase==="prep"){state.answers.speakPhase="talk";state.answers.speakSeconds=task.talk;e.target.textContent="Start speaking";if(el)el.textContent=fmt(task.talk);}
            else {state.answers.reviewed=true;e.target.textContent="Response complete";}
          }
        },1000);
      });
    }

    document.getElementById("levelSelect").addEventListener("change",e=>{state.target=e.target.value;saveState();render();});
    document.getElementById("resetBtn").addEventListener("click",()=>{if(confirm("Reset all saved practice progress?")){localStorage.removeItem("seltMasteryState");state={...defaultState};render();}});

    render();
  </script>
</body>
</html>
